<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Kedvenc videók</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">UTube</a>
        <a href="playlists.html" class="btn btn-outline-light btn-sm">Vissza a listákhoz</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow p-4">
        <h3>Kedvenc videók</h3>
        <div id="favoriteList" class="row mt-3">
            <p class="text-muted">Kedvencek betöltése...</p>
        </div>
    </div>
</div>

<script>
    const userId = localStorage.getItem('currentUserId');

    if (!userId) {
        window.location.href = 'login.html';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text == null ? '' : String(text);
        return div.innerHTML;
    }

    async function loadFavorites() {
        const box = document.getElementById('favoriteList');

        try {
            const res = await fetch(`/users/${userId}/favorites`);
            const videos = await res.json();

            if (!Array.isArray(videos) || videos.length === 0) {
                box.innerHTML = '<p class="text-muted">Még nincs kedvenc videód.</p>';
                return;
            }

            box.innerHTML = videos.map(v => `
                <div class="col-md-4 col-sm-6 mb-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">${escapeHtml(v.cim)}</h5>
                            <p class="card-text text-muted small">
                                ${escapeHtml(v.leiras || 'Nincs leírás.')}
                            </p>
                            <small class="text-muted">
                                Kedvelve: ${new Date(v.kedveles_ideje).toLocaleString('hu-HU')}
                            </small>
                        </div>
                        <div class="card-footer bg-white border-0">
                            <a href="watch.html?id=${v.video_id}" class="btn btn-sm btn-outline-danger w-100">
                                Megtekintés
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');

        } catch (err) {
            box.innerHTML = '<p class="text-danger">Nem sikerült betölteni a kedvenceket.</p>';
        }
    }

    loadFavorites();
</script>

</body>
</html>
