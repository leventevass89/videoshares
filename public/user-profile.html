<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Feltöltő profilja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">UTube</a>
        <a href="index.html" class="btn btn-outline-light btn-sm">Vissza a főoldalra</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow p-4 mb-4">
        <h3 id="userName">Felhasználó</h3>
        <p id="userEmail" class="text-muted"></p>
        <p id="userReg" class="text-muted"></p>
    </div>

    <div class="card shadow p-4">
        <h4>Feltöltött videók</h4>
        <div id="videoList" class="row mt-3">
            <p class="text-muted">Videók betöltése...</p>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('id');

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text == null ? '' : String(text);
        return div.innerHTML;
    }

    async function loadUserProfile() {
        const box = document.getElementById('videoList');

        if (!userId) {
            box.innerHTML = '<p class="text-danger">Hiányzó felhasználó azonosító.</p>';
            return;
        }

        try {
            const res = await fetch(`/users/${userId}/profile-videos`);
            const data = await res.json();

            if (!res.ok) {
                box.innerHTML = `<p class="text-danger">${escapeHtml(data.error)}</p>`;
                return;
            }

            document.getElementById('userName').innerText = data.user.nev;
            document.getElementById('userEmail').innerText = data.user.email;
            document.getElementById('userReg').innerText =
                `Regisztráció: ${new Date(data.user.reg_dat).toLocaleDateString('hu-HU')}`;

            if (!Array.isArray(data.videos) || data.videos.length === 0) {
                box.innerHTML = '<p class="text-muted">Ez a felhasználó még nem töltött fel videót.</p>';
                return;
            }

            box.innerHTML = data.videos.map(v => `
                <div class="col-md-4 col-sm-6 mb-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">${escapeHtml(v.cim)}</h5>
                            <p class="card-text text-muted small">
                                ${escapeHtml(v.leiras || 'Nincs leírás.')}
                            </p>
                        </div>
                        <div class="card-footer bg-white border-0">
                            <a href="watch.html?id=${v.video_id}" class="btn btn-sm btn-outline-danger w-100">
                                Megtekintés
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');

        } catch (err) {
            box.innerHTML = '<p class="text-danger">Nem sikerült betölteni a profilt.</p>';
        }
    }

    loadUserProfile();
</script>

</body>
</html>
