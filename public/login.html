<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Bejelentkezés</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand { 
            font-weight: bold; 
            color: #ff0000 !important; 
            font-size: 1.5rem;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">UTube</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="login.html" id="loginBtn" class="btn btn-outline-light me-2" style="display:none;">Bejelentkezés</a>
                <a href="regisztracio.html" id="regBtn" class="btn btn-danger" style="display:none;">Regisztráció</a>
                
                <a href="feltoltes.html" id="uploadBtn" class="btn btn-warning ms-2" style="display:none;">Videó feltöltése</a>
                
                <a href="profil.html" id="profilGomb" class="btn btn-primary ms-2" style="display:none;">Profilom</a>
            </div>
        </div>
    </nav>

    <div class="container d-flex justify-content-center mt-5">
        <div class="card shadow p-4" style="max-width: 400px; width: 100%;">
            <h3 class="text-center mb-4">Bejelentkezés</h3>
            <form id="loginForm">
                <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
                <input type="password" id="jelszo" class="form-control mb-3" placeholder="Jelszó" required>
                <button type="submit" class="btn btn-success w-100">Belépés</button>
            </form>
            <div id="status" class="mt-3"></div>
            <hr>
            <p class="text-center small">Nincs még fiókod? <a href="regisztracio.html">Regisztrálj!</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');

            const data = {
                email: document.getElementById('email').value,
                jelszo: document.getElementById('jelszo').value
            };

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await res.json();

            if (res.ok) {
                // ELMENTJÜK A USER ID-T A BÖNGÉSZŐBE!
                localStorage.setItem('currentUserId', result.userId);
                status.innerHTML = `<div class="alert alert-success">Sikeres belépés! Átirányítás...</div>`;
                setTimeout(() => window.location.href = "profil.html", 1500);
            } else {
                status.innerHTML = `<div class="alert alert-danger">${result.error}</div>`;
            }
        };
    </script>
</body>
</html>
