<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTube - Kezdőlap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .video-card { 
            transition: transform 0.2s; 
            cursor: pointer; 
            border: none;
        }
        .video-card:hover { 
            transform: scale(1.03); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
        .navbar-brand { 
            font-weight: bold; 
            color: #ff0000 !important; 
            font-size: 1.5rem;
        }
        .card-img-top {
            background: #212529;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">UTube</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="login.html" id="loginBtn" class="btn btn-outline-light me-2">Bejelentkezés</a>
                <a href="regisztracio.html" id="regBtn" class="btn btn-danger">Regisztráció</a>
                
                <a href="feltoltes.html" id="uploadBtn" class="btn btn-warning ms-2" style="display:none;">Videó feltöltése</a>
                <a href="profil.html" id="profilGomb" class="btn btn-primary ms-2" style="display:none;">Profilom</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="playlistAddModeBar" class="alert alert-warning justify-content-between align-items-center" style="display:none;">
        <span>
            Lejátszási listához adás mód aktív. Válassz ki egy videót mentésre.
         </span>

        <button class="btn btn-sm btn-outline-dark" onclick="exitPlaylistAddMode()">
            X
        </button>
    </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <h2 class="mb-0">Felkapott videók</h2>

                <div class="dropdown">
                    <button class="btn btn-outline-dark btn-sm dropdown-toggle" type="button" id="katDropdownBtn" data-bs-toggle="dropdown" aria-expanded="false">
                        Kategóriák: Összes
                    </button>
                    <ul class="dropdown-menu" aria-labelledby="katDropdownBtn" id="katDropdownMenu">
                        <li><span class="dropdown-item-text text-muted small">Betöltés…</span></li>
                    </ul>
                </div>

                <div class="dropdown">
                    <button class="btn btn-outline-dark btn-sm dropdown-toggle" type="button" id="sortDropdownBtn" data-bs-toggle="dropdown" aria-expanded="false">
                        Rendezés: Legújabb
                    </button>
                    <ul class="dropdown-menu" aria-labelledby="sortDropdownBtn" id="sortDropdownMenu">
                        <li><a class="dropdown-item active" href="#" data-sort="newest">Legújabb</a></li>
                        <li><a class="dropdown-item" href="#" data-sort="most_viewed">Legnézettebb</a></li>
                    </ul>
                </div>
            </div>

            <span class="badge bg-secondary" id="videoCount">0 videó</span>
        </div>
        
        <div id="videoGrid" class="row">
            </div>
    </div>

    <script>
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text == null ? '' : String(text);
            return div.innerHTML;
        }

        function formatTags(kategoriak) {
            const arr = Array.isArray(kategoriak) ? kategoriak : [];
            if (!arr.length) return '';
            return arr
                .map((t) => {
                    const label = typeof t === 'string' ? t : t && t.megnevezes;
                    if (!label) return '';
                    return `<span class="badge bg-secondary me-1 mb-1">${escapeHtml(label)}</span>`;
                })
                .join('');
        }

        function exitPlaylistAddMode() {
             window.location.href = 'index.html';
        }

        let selectedKatId = null;
        let kategoriakCache = [];
        let sortMode = 'newest';

        const urlParams = new URLSearchParams(window.location.search);
        const addToPlaylistId = urlParams.get('addToPlaylist');
        const isPlaylistAddMode = !!addToPlaylistId;

        async function loadKategoriakMenu() {
            const menu = document.getElementById('katDropdownMenu');
            const btn = document.getElementById('katDropdownBtn');
            try {
                const res = await fetch('/kategoriak');
                if (!res.ok) throw new Error('Szerver hiba');
                const rows = await res.json();
                kategoriakCache = Array.isArray(rows) ? rows : [];

                const items = [];
                items.push(`
                    <li>
                        <a class="dropdown-item ${selectedKatId == null ? 'active' : ''}" href="#" data-kat-id="">
                            Összes
                        </a>
                    </li>
                `);
                if (kategoriakCache.length) {
                    items.push('<li><hr class="dropdown-divider"></li>');
                    for (const k of kategoriakCache) {
                        items.push(`
                            <li>
                                <a class="dropdown-item ${selectedKatId === k.kat_id ? 'active' : ''}" href="#" data-kat-id="${k.kat_id}">
                                    ${escapeHtml(k.megnevezes)}
                                </a>
                            </li>
                        `);
                    }
                }

                menu.innerHTML = items.join('');

                menu.querySelectorAll('[data-kat-id]').forEach((a) => {
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        const raw = a.getAttribute('data-kat-id');
                        selectedKatId = raw ? parseInt(raw, 10) : null;

                        const label = selectedKatId
                            ? (kategoriakCache.find((x) => x.kat_id === selectedKatId)?.megnevezes || 'Ismeretlen')
                            : 'Összes';
                        btn.textContent = `Kategóriák: ${label}`;

                        loadVideos();
                        loadKategoriakMenu(); // refresh active state
                    });
                });
            } catch {
                menu.innerHTML = '<li><span class="dropdown-item-text text-danger small">Nem sikerült betölteni</span></li>';
            }
        }

        async function loadVideos() {
            const modeBar = document.getElementById('playlistAddModeBar');
            if (modeBar && isPlaylistAddMode) {
                modeBar.style.display = 'flex';
            }
            const grid = document.getElementById('videoGrid');
            const videoCountBadge = document.getElementById('videoCount');
            const profilGomb = document.getElementById('profilGomb');
            const uploadBtn = document.getElementById('uploadBtn');
            const loginBtn = document.getElementById('loginBtn');
            const regBtn = document.getElementById('regBtn');

            // 1. Felhasználó állapotának ellenőrzése
            const userId = localStorage.getItem('currentUserId');
            if (userId) {
                profilGomb.style.display = 'block';
                uploadBtn.style.display = 'block';
                loginBtn.style.display = 'none';
                regBtn.style.display = 'none';
            }

            try {
                // 2. Videók lekérése a szerverről
                const params = new URLSearchParams();
                if (selectedKatId) params.set('kat_id', String(selectedKatId));
                params.set('sort', sortMode);
                const url = `/videos?${params.toString()}`;
                const res = await fetch(url);
                const videos = await res.json();
                
                grid.innerHTML = ''; 
                videoCountBadge.innerText = `${videos.length} videó`;

                if (videos.length === 0) {
                    grid.innerHTML = '<div class="col-12 text-center text-muted"><p>Nincsenek még videók.</p></div>';
                    return;
                }

                // 3. Videók kirajzolása
                videos.forEach(v => {
                    const hossz = v.metaadatok?.hossz || '--';
                    const minoseg = v.metaadatok?.minoseg || 'SD';
                    const tagHtml = formatTags(v.kategoriak);

                    grid.innerHTML += `
                        <div class="col-md-4 col-sm-6 mb-4">
                            <div class="card h-100 shadow-sm video-card"
${isPlaylistAddMode ? '' : `onclick="window.location.href='watch.html?id=${v.video_id}'"`}>
                                <div class="card-img-top">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" fill="currentColor" class="bi bi-play-btn-fill" viewBox="0 0 16 16">
                                        <path d="M0 12V4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2m6.79-6.907A.5.5 0 0 0 6 5.5v5a.5.5 0 0 0 .79.407l3.5-2.5a.5.5 0 0 0 0-.814z"/>
                                    </svg>
                                </div>
                                <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center pb-0">
                                    <span class="badge bg-dark">${escapeHtml(minoseg)}</span>
                                    <small class="text-muted">${escapeHtml(hossz)} mp</small>
                                </div>
                                <div class="card-body">
                                    <h5 class="card-title text-truncate">${escapeHtml(v.cim)}</h5>
                                    <div class="mb-2">${tagHtml}</div>
                                    <p class="card-text text-muted small" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                                        ${escapeHtml(v.leiras || 'Nincs leírás.')}
                                    </p>
                                    <p class="small mb-0">
                                    Feltöltő:
                                    <a href="user-profile.html?id=${v.felhasznalo_id}"
                                    class="text-decoration-none fw-bold"
                                    onclick="event.stopPropagation()">
                                    ${escapeHtml(v.feltolto_nev)}
                                    </a>
                                </p>
                                </div>
                                <div class="card-footer bg-white border-0 pt-0">
                                    ${isPlaylistAddMode ? `
                                    <button class="btn btn-sm btn-success w-100 mb-2"
                                    onclick="saveVideoToPlaylist(${v.video_id}, event)">
                                    Mentés
                                    </button>
                                    ` : `
                                    <a href="watch.html?id=${v.video_id}" class="btn btn-sm btn-outline-danger w-100 mb-2">
                                    Megtekintés
                                    </a>
                                `}
                                </div>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                console.error("Szerver hiba:", err);
                grid.innerHTML = '<div class="alert alert-danger">Nem sikerült betölteni a videókat.</div>';
            }
        }

        function setupSortMenu() {
            const menu = document.getElementById('sortDropdownMenu');
            const btn = document.getElementById('sortDropdownBtn');

            menu.querySelectorAll('[data-sort]').forEach((a) => {
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    const selected = a.getAttribute('data-sort') || 'newest';
                    sortMode = selected === 'most_viewed' ? 'most_viewed' : 'newest';

                    menu.querySelectorAll('[data-sort]').forEach((x) => x.classList.remove('active'));
                    a.classList.add('active');

                    btn.textContent = sortMode === 'most_viewed'
                        ? 'Rendezés: Legnézettebb'
                        : 'Rendezés: Legújabb';

                    loadVideos();
                });
            });
        }

        window.onload = async () => {
            setupSortMenu();
            await loadKategoriakMenu();
            await loadVideos();
        };

        async function saveVideoToPlaylist(videoId, event) {
            
            event.preventDefault();
            event.stopPropagation();
            const userId = localStorage.getItem('currentUserId');

            if (!userId) {
                alert('Jelentkezz be!');
                return;
            }

            try {
                const res = await fetch(`/playlists/${addToPlaylistId}/videos`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    felhasznalo_id: userId,
                    video_id: videoId
                })
            });

            const result = await res.json();

            if (res.ok) {
                alert('Videó hozzáadva a lejátszási listához!');
            } else {
                alert(result.error || 'Nem sikerült hozzáadni.');
            }

            } catch (err) {
            alert('Szerverhiba történt.');
        }
    }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
