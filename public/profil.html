<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Saját Profil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
            <h2 class="text-center border-bottom pb-2">Saját Profil</h2>
            <div id="profilAdatok" class="mt-3">
                <p>Betöltés...</p>
            </div>
            <button onclick="logout()" class="btn btn-danger w-100 mt-3">Kijelentkezés</button>
        </div>
    </div>

    <script>
        async function loadProfil() {
            const userId = localStorage.getItem('currentUserId');
            if (!userId) {
                window.location.href = "login.html";
            }

            // Kell egy backend végpont, ami visszaadja a user adatait ID alapján
            const res = await fetch(`/user-data/${userId}`);
            const user = await res.json();

            document.getElementById('profilAdatok').innerHTML = `
                <p><strong>Név:</strong> ${user.nev}</p>
                <p><strong>Email:</strong> ${user.email}</p>
                <p><strong>Regisztráció:</strong> ${new Date(user.reg_dat).toLocaleDateString()}</p>
                <p><strong>Helyszín:</strong> ${user.lat.toFixed(4)}, ${user.lng.toFixed(4)}</p>
            `;
        }

        function logout() {
            localStorage.removeItem('currentUserId');
            window.location.href = "login.html";
        }

        loadProfil();
    </script>
</body>
</html>
