<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Regisztráció</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container card shadow p-4" style="max-width: 450px;">
        <h2 class="text-center">Regisztráció</h2>
        <form id="regForm">
            <input type="text" id="nev" class="form-control mb-3" placeholder="Teljes név" required>
            <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
            <input type="password" id="jelszo" class="form-control mb-3" placeholder="Jelszó" required>
            <button type="submit" class="btn btn-primary w-100">Regisztráció</button>
        </form>
        <div id="status" class="mt-3"></div>
    </div>

    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.innerHTML = "GPS koordináták lekérése...";

            // GPS koordináták lekérése a böngészőtől
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const data = {
                    nev: document.getElementById('nev').value,
                    email: document.getElementById('email').value,
                    jelszo: document.getElementById('jelszo').value,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude
                };

                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });



                const result = await res.json();
                if(res.ok) {
                    localStorage.setItem('currentUserId', result.user.felhasznalo_id);
                    status.innerHTML = `<div class="alert alert-success">Sikeres! Átirányítás...</div>`;
                    setTimeout(() => window.location.href = "profil.html", 1500);
                } else {
                    status.innerHTML = `<div class="alert alert-danger">${result.error}</div>`;
                }
            }, (err) => {
                status.innerHTML = `<div class="alert alert-warning">Engedélyezd a GPS-t a regisztrációhoz!</div>`;
            });
        };
    </script>
</body>
</html>
