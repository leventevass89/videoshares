<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>UTube - Megtekintés</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: white; }
        .video-container { background: black; border-radius: 12px; overflow: hidden; margin-top: 20px; }
        video { width: 100%; max-height: 70vh; }
        .comment-box { background: #212529; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
        .sidebar-box { background: #191c20; border: 1px solid #2f343a; border-radius: 12px; padding: 12px; }
        .rec-item { background: #212529; border: 1px solid #343a40; border-radius: 10px; padding: 10px; margin-bottom: 10px; text-decoration: none; color: #fff; display: block; }
        .rec-item:hover { border-color: #dc3545; background: #242a30; color: #fff; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container"><a class="navbar-brand text-danger fw-bold" href="index.html">UTube</a></div>
    </nav>

    <div class="container mt-3">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="video-container shadow-lg">
                    <video id="videoPlayer" controls autoplay>
                        <source id="videoSource" type="video/mp4">
                        <p id="videoError" class="text-danger m-3" style="display:none;">Videó betöltési hiba</p>
                    </video>
                    <div class="mt-3">
                        <button id="likeBtn" class="btn btn-outline-danger btn-sm" onclick="toggleLike()">
                        🤍 Kedvelem
                        </button>
                        <span id="likeCount" class="text-secondary ms-2">0 kedvelés</span>
                    </div>
                </div>

                <div class="mt-4 p-3 bg-dark rounded border border-secondary">
                    <h2 id="videoTitle">Betöltés...</h2>
                    <div id="videoTags" class="mb-2"></div>
                    <p id="videoDesc" class="text-secondary"></p>
                </div>

                <div class="mt-5">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h4 class="mb-0">Megjegyzések</h4>
                        <div class="btn-group btn-group-sm" role="group" aria-label="Komment rendezés">
                            <button id="sortNewestBtn" type="button" class="btn btn-outline-light active">Legújabb</button>
                            <button id="sortRelevantBtn" type="button" class="btn btn-outline-light">Legrelevánsabb</button>
                        </div>
                    </div>
                    
                    <div id="commentForm" class="mb-4" style="display:none;">
                        <textarea id="commentText" class="form-control bg-dark text-white border-secondary mb-2" placeholder="Írj egy megjegyzést..."></textarea>
                        <button onclick="sendComment()" class="btn btn-danger btn-sm">Küldés</button>
                    </div>
                    <p id="loginPrompt" class="text-muted small">Jelentkezz be, ha hozzá szeretnél szólni!</p>

                    <div id="commentList"></div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="sidebar-box position-sticky" style="top: 16px;">
                    <h5 class="mb-3">Ajánlott videók</h5>
                    <div id="recommendationList">
                        <p class="text-muted small mb-0">Ajánlások betöltése...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text == null ? '' : String(text);
            return div.innerHTML;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        let commentSort = 'newest';
        let viewLogged = false;

        function setCommentSort(sort) {
            commentSort = sort === 'relevant' ? 'relevant' : 'newest';
            const newest = document.getElementById('sortNewestBtn');
            const relevant = document.getElementById('sortRelevantBtn');
            newest.classList.toggle('active', commentSort === 'newest');
            relevant.classList.toggle('active', commentSort === 'relevant');
            loadComments();
        }

        async function loadRecommendations() {
            const box = document.getElementById('recommendationList');
            try {
                const res = await fetch(`/video-recommendations/${videoId}?limit=5`);
                if (!res.ok) throw new Error('Hiba az ajánlások lekérésében');
                const videos = await res.json();

                if (!Array.isArray(videos) || videos.length === 0) {
                    box.innerHTML = '<p class="text-muted small mb-0">Nincs ajánlás ehhez a videóhoz.</p>';
                    return;
                }

                box.innerHTML = videos.map((v) => {
                    const minoseg = v.metaadatok?.minoseg || 'SD';
                    const common = Number(v.common_cat_count || 0);
                    const shortDesc = (v.leiras || 'Nincs leírás.')
                        .toString()
                        .trim()
                        .slice(0, 90);
                    return `
                        <a class="rec-item" href="watch.html?id=${encodeURIComponent(v.video_id)}">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <span class="badge bg-danger">${escapeHtml(minoseg)}</span>
                                <small class="text-warning">Közös kategória: ${escapeHtml(common)}</small>
                            </div>
                            <div class="fw-semibold mb-1">${escapeHtml(v.cim || 'Névtelen videó')}</div>
                            <div class="small text-secondary">${escapeHtml(shortDesc)}</div>
                        </a>
                    `;
                }).join('');
            } catch {
                box.innerHTML = '<p class="text-danger small mb-0">Nem sikerült betölteni az ajánlásokat.</p>';
            }
        }

        async function logViewIfEligible() {
            if (viewLogged) return;
            const userId = parseInt(localStorage.getItem('currentUserId') || '', 10);
            if (!Number.isFinite(userId) || userId < 1) return;

            const video = document.getElementById('videoPlayer');
            if (!video) return;
            if (!Number.isFinite(video.currentTime) || video.currentTime < 10) return; // legalább 10 mp

            viewLogged = true;
            try {
                await fetch(`/videos/${encodeURIComponent(videoId)}/view`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        felhasznalo_id: userId,
                        duration: Number.isFinite(video.duration) ? video.duration : 0,
                        watched_seconds: video.currentTime,
                    }),
                });
            } catch (err) {
                // Csendes hiba: a lejátszást ne zavarjuk
                console.warn('View logging failed:', err);
            }
        }

        // Oldal inicializálása
        async function init() {
            if (!videoId) return window.location.href = 'index.html';

            // Videó forrása
            const videoSource = document.getElementById('videoSource');
            const videoPlayer = document.getElementById('videoPlayer');
            const videoError = document.getElementById('videoError');
            
            videoSource.src = `/video-stream/${videoId}`;
            
            // Error handling
            videoPlayer.onerror = function() {
                console.error('Video load error:', videoPlayer.error);
                videoError.style.display = 'block';
                videoError.innerText = 'Videó betöltési hiba: ' + (videoPlayer.error ? videoPlayer.error.message : 'Ismeretlen hiba');
            };
            
            videoPlayer.onloadedmetadata = function() {
                console.log('Video loaded, duration:', videoPlayer.duration);
            };
            videoPlayer.addEventListener('timeupdate', logViewIfEligible);
            
            videoPlayer.load();

            // Adatok lekérése
            const res = await fetch(`/video-details/${videoId}`);
            const data = await res.json();
            document.getElementById('videoTitle').innerText = data.cim;
            document.getElementById('videoDesc').innerText = data.leiras || '';

            const tags = Array.isArray(data.kategoriak) ? data.kategoriak : [];
            const tagEl = document.getElementById('videoTags');
            if (tags.length) {
                tagEl.innerHTML = tags
                    .map((t) => {
                        const label = typeof t === 'string' ? t : t && t.megnevezes;
                        return label
                            ? `<span class="badge bg-danger me-1">${escapeHtml(label)}</span>`
                            : '';
                    })
                    .join('');
            } else {
                tagEl.innerHTML = '';
            }

            // Jogosultság ellenőrzése (látszik-e az írás lehetőség)
            if (localStorage.getItem('currentUserId')) {
                document.getElementById('commentForm').style.display = 'block';
                document.getElementById('loginPrompt').style.display = 'none';
            }

            loadComments();
            loadRecommendations();
        }

        // Kommentek betöltése
        async function loadComments() {
            const res = await fetch(`/comments/${videoId}?sort=${encodeURIComponent(commentSort)}`);
            const comments = await res.json();
            const list = document.getElementById('commentList');
            list.innerHTML = '';

            if (!Array.isArray(comments) || comments.length === 0) {
                list.innerHTML = '<p class="text-muted">Még nincs megjegyzés.</p>';
                return;
            }

            comments.forEach(c => {
                const activityBadge = commentSort === 'relevant'
                    ? `<small class="badge bg-secondary">Aktivitás: ${escapeHtml(c.activity_count ?? 0)}</small>`
                    : '';
                list.innerHTML += `
                    <div class="comment-box border border-secondary">
                        <div class="d-flex justify-content-between">
                            <div>
                                <strong class="text-info">${escapeHtml(c.nev)}</strong>
                                ${activityBadge}
                            </div>
                            <small class="text-muted">${new Date(c.ervenyesseg_eleje).toLocaleString('hu-HU')}</small>
                        </div>
                        <p class="mb-0 mt-2">${escapeHtml(c.szoveg)}</p>
                    </div>
                `;
            });
        }

        // Komment küldése
    async function sendComment() {
    const textInput = document.getElementById('commentText');
    const szoveg = textInput.value;
    const userId = localStorage.getItem('currentUserId');

    if (!szoveg.trim()) {
        alert("Üres megjegyzést nem küldhetsz!");
        return;
    }

    try {
        const res = await fetch('/comments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                video_id: videoId,        // Ez az URL-ből jön: urlParams.get('id')
                felhasznalo_id: userId,   // Ez a localStorage-ból
                szoveg: szoveg
            })
        });

        if (res.ok) {
            textInput.value = '';
            loadComments(); // Frissítés
        } else {
            const err = await res.json();
            alert("Hiba történt: " + err.error);
        }
    } catch (err) {
        console.error("Hálózati hiba:", err);
        alert("Nem sikerült kapcsolódni a szerverhez.");
    }
}
    async function loadLikeStatus() {
        const userId = localStorage.getItem('currentUserId') || 0;

        const res = await fetch(`/videos/${videoId}/like-status/${userId}`);
        const data = await res.json();

        document.getElementById('likeCount').innerText = `${data.like_count} kedvelés`;

        const btn = document.getElementById('likeBtn');

        if (data.liked) {
            btn.classList.remove('btn-outline-danger');
            btn.classList.add('btn-danger');
            btn.innerText = '❤️ Kedvelve';
        } else {
            btn.classList.remove('btn-danger');
            btn.classList.add('btn-outline-danger');
            btn.innerText = '🤍 Kedvelem';
        }
    }

    async function toggleLike() {
        const userId = localStorage.getItem('currentUserId');

        if (!userId) {
            alert('Jelentkezz be a kedveléshez!');
            return;
        }

        const res = await fetch(`/videos/${videoId}/like`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ felhasznalo_id: userId })
        });

        const result = await res.json();

        if (!res.ok) {
            alert(result.error || 'Hiba történt.');
            return;
        }

        await loadLikeStatus();
    }

        document.getElementById('sortNewestBtn').addEventListener('click', () => setCommentSort('newest'));
        document.getElementById('sortRelevantBtn').addEventListener('click', () => setCommentSort('relevant'));

        init();
        loadLikeStatus();
    </script>
</body>
</html>
