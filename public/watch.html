<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>UTube - Megtekintés</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: white; }
        .video-container { background: black; border-radius: 12px; overflow: hidden; margin-top: 20px; }
        video { width: 100%; max-height: 70vh; }
        .comment-box { background: #212529; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container"><a class="navbar-brand text-danger fw-bold" href="index.html">UTube</a></div>
    </nav>

    <div class="container">
        <div class="video-container shadow-lg">
            <video id="videoPlayer" controls autoplay>
                <source id="videoSource" type="video/mp4">
            </video>
        </div>

        <div class="mt-4 p-3 bg-dark rounded border border-secondary">
            <h2 id="videoTitle">Betöltés...</h2>
            <p id="videoDesc" class="text-secondary"></p>
        </div>

        <div class="mt-5">
            <h4>Megjegyzések</h4>
            
            <div id="commentForm" class="mb-4" style="display:none;">
                <textarea id="commentText" class="form-control bg-dark text-white border-secondary mb-2" placeholder="Írj egy megjegyzést..."></textarea>
                <button onclick="sendComment()" class="btn btn-danger btn-sm">Küldés</button>
            </div>
            <p id="loginPrompt" class="text-muted small">Jelentkezz be, ha hozzá szeretnél szólni!</p>

            <div id="commentList">
                </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');

        // Oldal inicializálása
        async function init() {
            if (!videoId) return window.location.href = 'index.html';

            // Videó forrása
            document.getElementById('videoSource').src = `/video-stream/${videoId}`;
            document.getElementById('videoPlayer').load();

            // Adatok lekérése
            const res = await fetch(`/video-details/${videoId}`);
            const data = await res.json();
            document.getElementById('videoTitle').innerText = data.cim;
            document.getElementById('videoDesc').innerText = data.leiras;

            // Jogosultság ellenőrzése (látszik-e az írás lehetőség)
            if (localStorage.getItem('currentUserId')) {
                document.getElementById('commentForm').style.display = 'block';
                document.getElementById('loginPrompt').style.display = 'none';
            }

            loadComments();
        }

        // Kommentek betöltése
        async function loadComments() {
            const res = await fetch(`/comments/${videoId}`);
            const comments = await res.json();
            const list = document.getElementById('commentList');
            list.innerHTML = '';

            comments.forEach(c => {
                list.innerHTML += `
                    <div class="comment-box border border-secondary">
                        <div class="d-flex justify-content-between">
                            <strong class="text-info">${c.nev}</strong>
                            <small class="text-muted">${new Date(c.ervenyesseg_eleje).toLocaleString('hu-HU')}</small>
                        </div>
                        <p class="mb-0 mt-2">${c.szoveg}</p>
                    </div>
                `;
            });
        }

        // Komment küldése
    async function sendComment() {
    const textInput = document.getElementById('commentText');
    const szoveg = textInput.value;
    const userId = localStorage.getItem('currentUserId');

    if (!szoveg.trim()) {
        alert("Üres megjegyzést nem küldhetsz!");
        return;
    }

    try {
        const res = await fetch('/comments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                video_id: videoId,        // Ez az URL-ből jön: urlParams.get('id')
                felhasznalo_id: userId,   // Ez a localStorage-ból
                szoveg: szoveg
            })
        });

        if (res.ok) {
            textInput.value = '';
            loadComments(); // Frissítés
        } else {
            const err = await res.json();
            alert("Hiba történt: " + err.error);
        }
    } catch (err) {
        console.error("Hálózati hiba:", err);
        alert("Nem sikerült kapcsolódni a szerverhez.");
    }
}

        init();
    </script>
</body>
</html>
