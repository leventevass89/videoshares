<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Lejátszási listák</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">UTube</a>
        <a href="profil.html" class="btn btn-outline-light btn-sm">Vissza a profilhoz</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow p-4 mb-4">
        <h3>Új lejátszási lista létrehozása</h3>

        <input type="text" id="playlistName" class="form-control mb-3" placeholder="Lista neve">

        <button onclick="createPlaylist()" class="btn btn-warning">
            Létrehozás
        </button>

        <div id="status" class="mt-3"></div>
    </div>

    <div class="card shadow p-4">
        <h3>Saját lejátszási listák</h3>
        <div id="playlistList">
            <p class="text-muted">Betöltés...</p>
        </div>
    </div>
    
     <div class="card shadow p-4 mb-4">
        <h3>Kedvencek</h3>
        <p class="text-muted">A lájkolt videóid automatikusan itt jelennek meg.</p>
        <a href="favorites.html" class="btn btn-danger">
            Kedvenc videók megnyitása
        </a>
    </div>
</div>

<script>
    const userId = localStorage.getItem('currentUserId');

    if (!userId) {
        window.location.href = 'login.html';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text == null ? '' : String(text);
        return div.innerHTML;
    }

    async function createPlaylist() {
        const nev = document.getElementById('playlistName').value;
        const status = document.getElementById('status');

        if (!nev.trim()) {
            status.innerHTML = '<div class="alert alert-warning">Adj nevet a listának!</div>';
            return;
        }

        try {
            const res = await fetch('/playlists', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    felhasznalo_id: userId,
                    nev: nev
                })
            });

            const result = await res.json();

            if (res.ok) {
                status.innerHTML = '<div class="alert alert-success">Lejátszási lista létrehozva!</div>';
                document.getElementById('playlistName').value = '';
                loadPlaylists();
            } else {
                status.innerHTML = `<div class="alert alert-danger">${escapeHtml(result.error)}</div>`;
            }

        } catch (err) {
            status.innerHTML = '<div class="alert alert-danger">Szerverhiba történt.</div>';
        }
    }

    async function loadPlaylists() {
        const box = document.getElementById('playlistList');

        try {
            const res = await fetch(`/playlists/user/${userId}`);
            const playlists = await res.json();

            if (!Array.isArray(playlists) || playlists.length === 0) {
                box.innerHTML = '<p class="text-muted">Még nincs lejátszási listád.</p>';
                return;
            }

            box.innerHTML = playlists.map(p => `
                <div class="border rounded p-3 mb-3 bg-white">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="mb-1">
                            <a href="playlist-view.html?lej_id=${p.lej_id}&name=${encodeURIComponent(p.listanev)}"
                            class="text-decoration-none text-dark">
                            ${escapeHtml(p.listanev)}
                            </a>
                            </h5>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-success btn-sm"
                            onclick="addVideosToPlaylist(${p.lej_id})">
                            +
                            </button>

                            <button class="btn btn-outline-primary btn-sm"
                            onclick="renamePlaylist(${p.lej_id}, '${escapeHtml(p.listanev)}')">
                            Átnevezés
                            </button>

                            <button class="btn btn-outline-danger btn-sm"
                            onclick="deletePlaylist(${p.lej_id})">
                            Törlés
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

        } catch (err) {
            box.innerHTML = '<p class="text-danger">Nem sikerült betölteni a listákat.</p>';
        }
    }

    async function deletePlaylist(listaId) {
        if (!confirm('Biztos törlöd ezt a lejátszási listát?')) return;

        try {
            const res = await fetch(`/playlists/${listaId}`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    felhasznalo_id: userId
                })
            });

            if (res.ok) {
                loadPlaylists();
            } else {
                const result = await res.json();
                alert(result.error || 'Nem sikerült törölni.');
            }

        } catch (err) {
            alert('Szerverhiba történt.');
        }
    }
    async function renamePlaylist(lejId, currentName) {

    const ujNev = prompt('Új lejátszási lista név:', currentName);

    if (!ujNev || !ujNev.trim()) return;

    try {

        const res = await fetch(`/playlists/${lejId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                felhasznalo_id: userId,
                listanev: ujNev
            })
        });

        const result = await res.json();

        if (res.ok) {
            loadPlaylists();
        } else {
            alert(result.error || 'Nem sikerült átnevezni.');
        }

    } catch (err) {
        alert('Szerverhiba történt.');
    }
}
    function addVideosToPlaylist(lejId) {
        //window.location.href = `index.html?playlistMode=1&lej_id=${lejId}`;
        window.location.href = `index.html?addToPlaylist=${lejId}`;
    }

    loadPlaylists();
</script>

</body>
</html>
