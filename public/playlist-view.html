<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Lejátszási lista videói</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">UTube</a>
        <a href="playlists.html" class="btn btn-outline-light btn-sm">Vissza a listákhoz</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow p-4">
        <h3 id="playlistTitle">Lejátszási lista</h3>
        <div id="videoList" class="row mt-3">
            <p class="text-muted">Videók betöltése...</p>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const lejId = params.get('lej_id');
    const playlistName = params.get('name');

    if (playlistName) {
        document.getElementById('playlistTitle').innerText = playlistName;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text == null ? '' : String(text);
        return div.innerHTML;
    }

    async function loadPlaylistVideos() {
        const box = document.getElementById('videoList');

        if (!lejId) {
            box.innerHTML = '<p class="text-danger">Hiányzó lejátszási lista azonosító.</p>';
            return;
        }

        try {
            const res = await fetch(`/playlists/${lejId}/videos`);
            const videos = await res.json();

            if (!Array.isArray(videos) || videos.length === 0) {
                box.innerHTML = '<p class="text-muted">Ebben a lejátszási listában még nincs videó.</p>';
                return;
            }

            box.innerHTML = videos.map(v => `
                <div class="col-md-4 col-sm-6 mb-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">${escapeHtml(v.cim)}</h5>
                            <p class="card-text text-muted small">
                                ${escapeHtml(v.leiras || 'Nincs leírás.')}
                            </p>
                        </div>
                        <div class="card-footer bg-white border-0">
                            <a href="watch.html?id=${v.video_id}" class="btn btn-sm btn-outline-danger w-100">
                                Megtekintés
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');

        } catch (err) {
            box.innerHTML = '<p class="text-danger">Nem sikerült betölteni a videókat.</p>';
        }
    }

    loadPlaylistVideos();
</script>

</body>
</html>
