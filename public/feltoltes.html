<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Videó Feltöltés</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container card shadow p-4" style="max-width: 600px;">
        <h3>Új videó feltöltése</h3>
        <form id="uploadForm">
            <input type="text" id="cim" class="form-control mb-3" placeholder="Videó címe" required>
            <textarea id="leiras" class="form-control mb-3" placeholder="Leírás"></textarea>
            
            <div class="row">
                <div class="col-md-6 border-end">
                    <label class="small text-muted">Hossz (mp)</label>
                    <input type="number" id="hossz" class="form-control mb-3" value="60">
                </div>
                <div class="col-md-6">
                    <label class="small text-muted">Minőség</label>
                    <select id="minoseg" class="form-control mb-3">
                        <option value="HD">HD</option>
                        <option value="FullHD">FullHD</option>
                        <option value="4K">4K</option>
                    </select>
                </div>
            </div>

            <input type="file" id="videoFile" class="form-control mb-3" accept="video/*" required>
            <button type="submit" class="btn btn-danger w-100">Feltöltés indítása</button>
        </form>
        <div id="status" class="mt-3"></div>
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            const userId = localStorage.getItem('currentUserId');

            if(!userId) {
                alert("Jelentkezz be a feltöltéshez!");
                return;
            }

            const formData = new FormData();
            formData.append('cim', document.getElementById('cim').value);
            formData.append('leiras', document.getElementById('leiras').value);
            formData.append('hossz', document.getElementById('hossz').value);
            formData.append('minoseg', document.getElementById('minoseg').value);
            formData.append('felhasznalo_id', userId);
            formData.append('videoFile', document.getElementById('videoFile').files[0]);

            status.innerHTML = "Feltöltés folyamatban...";

            const res = await fetch('/upload', {
                method: 'POST',
                body: formData // FormData esetén nem kell Header Content-Type!
            });

            if(res.ok) {
                status.innerHTML = '<div class="alert alert-success">Sikeres feltöltés!</div>';
                setTimeout(() => window.location.href = "index.html", 2000);
            } else {
                status.innerHTML = '<div class="alert alert-danger">Hiba történt.</div>';
            }
        };
    </script>
</body>
</html>
